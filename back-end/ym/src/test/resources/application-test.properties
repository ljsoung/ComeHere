# 테스트 전용 설정
# MySQL 대신 H2 인메모리 DB를 사용하므로 application-local.properties 임포트 불필요
spring.config.import=

# H2 인메모리 DB
spring.datasource.url=jdbc:h2:mem:testdb;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# 테스트 시작 시 테이블 생성, 종료 시 삭제
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# 테스트 전용 JWT 시크릿 (256bit 이상)
jwt.secret=test-secret-key-must-be-at-least-256-bits-for-HS256-algorithm-test-only
jwt.expiration=86400000